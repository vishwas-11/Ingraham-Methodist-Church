name: Livestream Automation
on:
  schedule:
    - cron: '*/5 * * * *'   # check live status every 5 minutes
  workflow_dispatch: {}
jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Check Live Status
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://YOURDOMAIN.com/api/cron/check-live
